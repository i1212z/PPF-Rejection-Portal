services:
  # FastAPI Backend
  - type: web
    name: ppf-backend
    env: python
    rootDir: backend
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: database_url
        value: postgresql+asyncpg://ppf_rejection_db_user:yaaPJ10LWPeOYHhPYRghsIEYVgyKGZhI@dpg-d6plfan5gffc73dme5qg-a.oregon-postgres.render.com:5432/ppf_rejection_db

  # React + Vite Frontend (SPA)
  # Required: In Render Dashboard → ppf-frontend → Redirects/Rewrites:
  #   Add rule: Source /* → Destination /index.html, Action: Rewrite
  #   (so /login, /tickets, etc. work on direct load/refresh)
  - type: web
    name: ppf-frontend
    runtime: static
    rootDir: frontend
    autoDeploy: true

    buildCommand: |
      npm install
      npm run build

    staticPublishPath: dist

    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ppf-backend
          envVarKey: RENDER_EXTERNAL_URL
