services:
  # FastAPI backend on Render
  - type: web
    name: ppf-backend
    env: python
    rootDir: backend
    plan: free
    autoDeploy: true

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # JWT / auth settings
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      # Use SQLite file inside the service container (demo / non-persistent)
      - key: DATABASE_URL
        value: "sqlite+aiosqlite:///./rejections_dev.db"

  # React + Vite frontend on Render (static site)
  - type: static_site
    name: ppf-frontend
    rootDir: frontend
    plan: free
    autoDeploy: true

    buildCommand: |
      npm install
      npm run build

    publishDir: dist

    envVars:
      # Point frontend API to backend Render service URL
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ppf-backend
          envVarName: RENDER_EXTERNAL_URL

